name = "traced"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for tracking data
# After running `wrangler kv:namespace create TRACED_KV`
# paste the id you get below
[[kv_namespaces]]
binding = "TRACED_KV"
id = "48c69f385cc34703b6341a84b72404f9"

# Serve static files (landing page, dashboard, privacy)
[assets]
directory = "./public"

[vars]
BASE_URL = "https://traced.mikaelsyed.me"

# Custom domain routing
[[routes]]
pattern = "traced.mikaelsyed.me/*"
zone_name = "mikaelsyed.me"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1